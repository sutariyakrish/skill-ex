version: "2"
type: frontend
tech_stack:
  - Vanilla JS
  - HTML/CSS
  - Firebase (Auth, Firestore)
routes:
  - path: /
    file: index.html
    auth_required: false
    description: Main SPA entry
  - path: /#dashboard
    file: js/views/dashboard.js
    auth_required: true
    description: User dashboard
  - path: /#marketplace
    file: js/views/marketplace.js
    auth_required: true
    description: Marketplace discovery
  - path: /#create-listing
    file: js/views/createListing.js
    auth_required: true
    description: Create a new listing
  - path: /#trades
    file: js/views/trades.js
    auth_required: true
    description: User trades
  - path: /#messages
    file: js/views/messages.js
    auth_required: true
    description: User messages
  - path: /#profile
    file: js/views/profile.js
    auth_required: true
    description: User profile
  - path: /#admin
    file: js/views/adminView.js
    auth_required: true
    description: Admin dashboard
features:
  - name: User Login
    description: Login with email and password credentials
    files:
      - js/app.js
      - index.html
    entry_route: /
    user_interactions:
      - Fill email input field
      - Fill password input field
      - Click Login button to submit
      - See error message on invalid credentials
      - Toggle password visibility
    api_calls:
      - method: POST
        endpoint: firebase/auth/login
    auth_required: false
  - name: User Signup
    description: Multi-step signup flow
    files:
      - js/app.js
    entry_route: /
    user_interactions:
      - Fill signup fields (email, password, name)
      - Select user type
      - Select location
    api_calls:
      - method: POST
        endpoint: firebase/auth/signup
    auth_required: false
  - name: Marketplace Discovery
    description: View and filter listings
    files:
      - js/views/marketplace.js
    entry_route: /#marketplace
    user_interactions:
      - See listings
      - Use basic search
      - Verify own listings are not shown
    api_calls:
      - method: GET
        endpoint: firebase/firestore/listings
    auth_required: true
  - name: Create Listing
    description: Add a new listing to the marketplace
    files:
      - js/views/createListing.js
    entry_route: /#create-listing
    user_interactions:
      - Fill form
      - Submit form
      - See listing in marketplace
    api_calls:
      - method: POST
        endpoint: firebase/firestore/listings
    auth_required: true
  - name: Trade Flow
    description: Initiate and manage trades
    files:
      - js/views/trades.js
    entry_route: /#trades
    user_interactions:
      - Initiate trade
      - Trade status updates
    api_calls:
      - method: POST
        endpoint: firebase/firestore/trades
    auth_required: true
  - name: Messaging
    description: Chat with users
    files:
      - js/views/messages.js
    entry_route: /#messages
    user_interactions:
      - Send message
      - Receive message
    api_calls:
      - method: POST
        endpoint: firebase/firestore/messages
    auth_required: true
  - name: Review System
    description: Leave a review
    files:
      - js/views/trades.js
    entry_route: /#trades
    user_interactions:
      - Submit review
    api_calls:
      - method: POST
        endpoint: firebase/firestore/reviews
    auth_required: true
known_limitations: []
